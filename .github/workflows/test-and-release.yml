name: Test and Release

# Run this job on all pushes and pull requests as well as tags with a semantic version
on:
  push:
    branches:
      - "main"
    tags:
      # normal versions
      - "v[0-9]+.[0-9]+.[0-9]+"
      # pre-releases
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

# Opt actions/checkout@v4 and actions/setup-node@v4 into Node 24 ahead of the
# 2026-06-02 forced switch, so the deprecation warning stops showing in run
# annotations. Can be removed once the runners ship Node 24 as the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Least-privilege default token scope for all jobs; the deploy job below opts
# into the extra scopes it needs (id-token/contents: write) at job level.
permissions:
  contents: read

jobs:
  # Performs quick checks before the expensive test runs
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: ioBroker/testing-action-check@v1
        with:
          node-version: '24.x'
          lint: true

  # i18n gate: flag strings identical to English (ioBroker E5606 rule)
  i18n-check:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - run: python3 scripts/check-i18n.py

  # Coverage threshold gate (lines ≥80%, functions ≥80%, branches ≥70%)
  coverage-check:
    needs: check-and-lint
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      - run: npm ci
      - run: npm run test:coverage:check

  # Runs adapter tests on all supported node versions and OSes
  adapter-tests:
    needs: check-and-lint
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          # No integration test harness — adapter ships only unit tests.
          # `test/integration/stream.spec.ts` is a manual live-camera probe
          # gated by BOSCH_LIVE_TEST=1 and is not in the repo.
          integration-test-command: 'echo "integration tests skipped — unit suite covers all production code"'

  # Publishes to npm on tag push via npm Trusted Publishing (OIDC).
  # No NPM_TOKEN secret is used — the npmjs.com package is configured with
  # a Trusted Publisher pointing at this repo + workflow, and the deploy
  # action exchanges the GitHub OIDC token for a short-lived publish token
  # at runtime. id-token: write is required for that exchange.
  deploy:
    needs: [check-and-lint, adapter-tests, coverage-check, i18n-check]
    if: |
      contains(github.event.head_commit.message, '[skip ci]') == false &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      # Skip publish if this version is already on npm (e.g. after a SQUASH_RELEASE
      # force-push that re-triggers the tag workflow on an already-published version).
      - name: Check if version already published on npm
        id: npm_check
        run: |
          VERSION="${GITHUB_REF##*/v}"
          if npm view "iobroker.bosch-smart-home-camera@${VERSION}" version --registry https://registry.npmjs.org 2>/dev/null | grep -qF "${VERSION}"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already on npm — skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.npm_check.outputs.already_published == 'false'
        uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: '24.x'
          github-token: ${{ secrets.GITHUB_TOKEN }}
