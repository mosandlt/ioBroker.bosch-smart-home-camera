version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: cron
    cronjob: 17 4 5 * *
  open-pull-requests-limit: 10
  versioning-strategy: increase
  cooldown:
    default-days: 7
  labels:
  - dependencies
  ignore:
  - dependency-name: '@types/node'
    update-types:
    - version-update:semver-major
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: cron
    cronjob: 43 6 19 * *
  cooldown:
    default-days: 7
  labels:
  - dependencies
  - github_actions
