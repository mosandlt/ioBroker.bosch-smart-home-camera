name: Bug Report
description: Report a bug in the ioBroker Bosch Smart Home Camera adapter
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Adapter version
    validations:
      required: true
  - type: input
    id: js_controller
    attributes:
      label: JS-Controller / Node.js version
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Please redact any tokens, passwords, or personal data before pasting.
      render: shell
